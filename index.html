<!DOCTYPE html>
<html>
<head>
    <title>Smart Water Leakage System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>SMART WATER LEAKAGE SYSTEM</h1>

    <div>
        <h2>Leakage Status</h2>
        <p id="status">LEAKAGE DETECTED</p>
    </div>

    <div>
        <h2>Leakage Location</h2>
        <p id="location">Main Pipeline - Block A</p>
    </div>

    <div>
        <h2>Water Level</h2>
        <p>75%</p>
        <button onclick="changePump()">TURN PUMP OFF</button>
    </div>

    <div>
        <h2>Submit Complaint</h2>
        <form id="complaintForm">
            <textarea id="complaintText" placeholder="Describe your complaint..." rows="4" required></textarea>
            <input type="email" id="complaintEmail" placeholder="Your email (optional)" />
            <button type="submit" class="submit-btn">Submit Complaint</button>
        </form>
    </div>

    <div>
        <h2>Recent Complaints</h2>
        <div id="complaintsList">
            <p style="color: gray; font-size: 14px;">No complaints yet</p>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
